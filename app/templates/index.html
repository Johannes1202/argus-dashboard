<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Argus</title>
  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      color: #1a1a1a;
      font-size: 14px;
      line-height: 1.5;
      display: flex;
      flex-direction: column;
    }

    /* ── header / nav ── */
    header {
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      padding: 0 1.5rem;
      height: 48px;
      display: flex;
      align-items: center;
      gap: 2rem;
      flex-shrink: 0;
      z-index: 10;
    }
    .logo {
      font-size: 0.9375rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #111;
      flex-shrink: 0;
    }
    nav { display: flex; gap: 0.25rem; flex: 1; }
    .tab {
      padding: 0.3rem 0.875rem;
      border-radius: 6px;
      font-size: 0.8125rem;
      font-weight: 500;
      color: #4b5563;
      cursor: pointer;
      border: none;
      background: none;
      transition: background 0.1s, color 0.1s;
      white-space: nowrap;
    }
    .tab:hover  { background: #f3f4f6; color: #111; }
    .tab.active { background: #111; color: #fff; }
    .updated {
      font-size: 0.7rem;
      color: #6b7280;
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }
    .logout-btn {
      font-size: 0.75rem;
      font-weight: 500;
      color: #6b7280;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.25rem 0.5rem;
      border-radius: 5px;
      flex-shrink: 0;
      text-decoration: none;
    }
    .logout-btn:hover { background: #f3f4f6; color: #111; }

    /* ── page content ── */
    #page-content {
      flex: 1;
      overflow: auto;
      padding: 1.5rem;
    }

    /* ── cards ── */
    .card {
      background: #fff;
      border-radius: 10px;
      padding: 1.25rem 1.5rem;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05), 0 0 0 1px rgba(0,0,0,0.04);
    }
    .card-title {
      font-size: 0.625rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #6b7280;
      margin-bottom: 1rem;
    }

    /* ── layout helpers ── */
    .grid      { display: grid; gap: 1rem; }
    .col-2     { grid-template-columns: 1fr 1fr; }
    .col-3     { grid-template-columns: 1fr 1fr 1fr; }
    .col-4     { grid-template-columns: repeat(4, 1fr); }

    /* ── stat cards (overview) ── */
    .stat-val  { font-size: 1.75rem; font-weight: 700; letter-spacing: -0.04em; line-height: 1; }
    .stat-sub  { font-size: 0.7rem; color: #6b7280; text-transform: uppercase; letter-spacing: 0.06em; margin-top: 0.3rem; }
    .stat-bar  { margin-top: 0.75rem; }
    .overprov  { color: #ef4444; }
    .ok        { color: #22c55e; }

    /* ── tables ── */
    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left;
      font-size: 0.625rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #6b7280;
      padding: 0 0.75rem 0.6rem 0;
      white-space: nowrap;
    }
    td {
      padding: 0.45rem 0.75rem 0.45rem 0;
      font-size: 0.8125rem;
      border-top: 1px solid #f3f4f6;
      vertical-align: middle;
    }
    tr:first-child td { border-top: none; }

    /* ── status dot ── */
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
    }
    .dot-green { background: #22c55e; }
    .dot-red   { background: #ef4444; }
    .dot-grey  { background: #d1d5db; }

    /* ── progress bars ── */
    .bar-row    { margin-bottom: 1rem; }
    .bar-row:last-child { margin-bottom: 0; }
    .bar-label  { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 0.3rem; }
    .bar-name   { font-size: 0.8125rem; font-weight: 500; }
    .bar-type   { font-size: 0.7rem; color: #6b7280; margin-left: 0.4rem; font-weight: 400; }
    .bar-detail { font-size: 0.75rem; color: #4b5563; }
    .bar-bg     { background: #f3f4f6; border-radius: 4px; height: 7px; overflow: hidden; }
    .bar-fill   { height: 100%; border-radius: 4px; transition: width 0.4s ease; }
    .bar-green  { background: #22c55e; }
    .bar-amber  { background: #f59e0b; }
    .bar-red    { background: #ef4444; }

    /* ── mini bars (in tables) ── */
    .mini-wrap  { display: flex; align-items: center; gap: 0.5rem; min-width: 80px; }
    .mini-bg    { flex: 1; background: #f3f4f6; border-radius: 3px; height: 5px; position: relative; }
    .mini-fill  { height: 100%; border-radius: 3px; }
    .mini-label { font-size: 0.7rem; color: #4b5563; width: 60px; text-align: right; flex-shrink: 0; }
    .peak-mark  { position: absolute; top: -2px; bottom: -2px; width: 2px; background: #f97316; border-radius: 1px; cursor: default; }

    /* ── vm cards (overview) ── */
    .vm-hdr     { display: flex; justify-content: space-between; align-items: flex-start; }
    .vm-name    { font-weight: 600; font-size: 0.9rem; display: flex; align-items: center; gap: 0.35rem; }
    .vm-meta    { font-size: 0.65rem; color: #6b7280; margin-top: 0.2rem; }
    .vm-uptime  { font-size: 0.7rem; color: #6b7280; white-space: nowrap; margin-left: 0.5rem; padding-top: 0.1rem; }
    .vm-bar-row { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.45rem; }
    .vm-bar-lbl { font-size: 0.6rem; color: #6b7280; text-transform: uppercase; letter-spacing: 0.06em; width: 26px; flex-shrink: 0; }
    .vm-bar-bg  { flex: 1; background: #f3f4f6; border-radius: 4px; height: 7px; position: relative; }
    .vm-bar-val { font-size: 0.7rem; color: #4b5563; width: 100px; text-align: right; flex-shrink: 0; white-space: nowrap; }

    /* ── copy-to-clipboard ── */
    .copy-ip    { font-family: monospace; font-size: 0.8rem; color: #374151; cursor: pointer; padding: 0.1rem 0.35rem; border-radius: 3px; transition: background 0.12s; display: inline-block; }
    .copy-ip:hover { background: #e5e7eb; }
    .copy-ip:active { background: #d1fae5; color: #065f46; }

    /* ── chips ── */
    .chips       { display: flex; flex-wrap: wrap; gap: 0.35rem; }
    .chip {
      display: inline-flex; align-items: center; gap: 0.3rem;
      padding: 0.2rem 0.55rem;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 500;
      line-height: 1.6;
      white-space: nowrap;
    }
    .chip-green  { background: #dcfce7; color: #15803d; }
    .chip-red    { background: #fee2e2; color: #b91c1c; }
    .chip-amber  { background: #fef3c7; color: #92400e; }
    .chip-grey   { background: #f3f4f6; color: #4b5563; }

    /* ── badge (passthrough, disk info) ── */
    .badge {
      display: inline-block;
      padding: 0.1rem 0.4rem;
      border-radius: 4px;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      background: #f3f4f6;
      color: #4b5563;
      margin: 0.1rem 0.1rem 0.1rem 0;
    }
    .badge-gpu   { background: #ede9fe; color: #6d28d9; }
    .badge-pci   { background: #dbeafe; color: #1d4ed8; }

    /* ── url links ── */
    a.link { color: #4b5563; text-decoration: none; font-size: 0.75rem; }
    a.link:hover { color: #111; text-decoration: underline; }

    /* ── empty state ── */
    .empty { color: #6b7280; font-size: 0.8rem; padding: 0.5rem 0; }

    /* ── divider ── */
    .section-divider { border: none; border-top: 1px solid #f3f4f6; margin: 1.25rem 0; }

    /* ── settings page ── */
    .cfg-input {
      width: 100%; border: 1px solid #e5e7eb; border-radius: 5px;
      padding: 0.3rem 0.5rem; font-size: 0.8rem; color: #111;
      background: #fff; outline: none;
    }
    .cfg-input:focus { border-color: #6b7280; }
    .del-btn {
      background: none; border: none; color: #9ca3af; cursor: pointer;
      font-size: 1rem; padding: 0 0.25rem; line-height: 1;
    }
    .del-btn:hover { color: #ef4444; }
    .add-btn {
      font-size: 0.75rem; font-weight: 500; color: #4b5563;
      background: #f3f4f6; border: none; border-radius: 5px;
      padding: 0.3rem 0.7rem; cursor: pointer;
    }
    .add-btn:hover { background: #e5e7eb; color: #111; }
    .save-btn {
      font-size: 0.8rem; font-weight: 600; color: #fff;
      background: #111; border: none; border-radius: 6px;
      padding: 0.4rem 1rem; cursor: pointer;
    }
    .save-btn:hover { background: #374151; }
    .cfg-msg  { font-size: 0.75rem; color: #6b7280; }
    .cfg-ok   { color: #16a34a; }
    .cfg-err  { color: #ef4444; }
  </style>
</head>
<body>
  <header>
    <span class="logo">Argus</span>
    <nav>
      <button class="tab active" onclick="switchTab('overview', this)">Overview</button>
      <button class="tab" onclick="switchTab('vms', this)">Virtual Machines</button>
      <button class="tab" onclick="switchTab('storage', this)">Storage</button>
      <button class="tab" onclick="switchTab('backups', this)">Backups</button>
      <button class="tab" onclick="switchTab('network', this)">Network</button>
      <button class="tab" onclick="switchTab('pihole', this)">Pi-hole</button>
      <button class="tab" onclick="switchTab('settings', this)">Settings</button>
    </nav>
    <span class="updated" id="last-updated">—</span>
    <a href="/logout" class="logout-btn">Sign out</a>
  </header>

  <div id="page-content">
    <p class="empty">Loading…</p>
  </div>

  <script>
    let _refreshInterval = null;
    let _activePage = 'overview';

    function switchTab(page, btn) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      _activePage = page;
      loadPage(page);
      if (_refreshInterval) clearInterval(_refreshInterval);
      if (page !== 'settings') {
        _refreshInterval = setInterval(() => loadPage(page), 15000);
      }
    }

    function loadPage(page) {
      htmx.ajax('GET', `/page/${page}`, {target: '#page-content', swap: 'innerHTML'});
      // also refresh the timestamp
      fetch('/api/status').then(r => r.json()).then(d => {
        if (d.last_updated) document.getElementById('last-updated').textContent = d.last_updated;
      });
    }

    // load default page on startup
    loadPage('overview');
    _refreshInterval = setInterval(() => loadPage(_activePage), 15000);
  </script>
</body>
</html>
